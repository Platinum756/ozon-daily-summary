<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
body { width: 540px; font-family: Arial, sans-serif; padding: 12px; margin: 0; }
h3 { margin-top: 0; color: #2c3e50; text-align: center; font-size: 16px; }
button { width: 100%; padding: 10px; background: #27ae60; color: white; border: none; cursor: pointer; border-radius: 4px; font-weight: bold; font-size: 13px; }
button:hover { background: #219a52; }
#status { margin-top: 10px; font-size: 12px; color: #7f8c8d; text-align: center; }

/* Table Layout */
table { 
	width: 100%; 
	margin-top: 12px; 
	border-collapse: collapse; 
	font-size: 11px; 
	display: none; 
}
th, td { 
	border: 1px solid #ddd; 
	padding: 3px 2px;
	text-align: center; 
	line-height: 1.2;
}
th { 
	background-color: #f4f6f7; 
	color: #333; 
	font-weight: bold; 
}
td.count { 
	font-weight: bold; 
	color: #2980b9; 
	font-size: 12px;
	padding: 5px 2px;
}


</style>
</head>
<body>
<h3>Ozon Daily Summary</h3>

<button id="startBtn">Get Today's Counts</button>
<div id="status">Ready</div>

<table id="resultsTable"></table>

<script src="popup.js"></script>
</body>
</html>
